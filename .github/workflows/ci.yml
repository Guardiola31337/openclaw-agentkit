name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  OPENCLAW_HOST_API_REPOSITORY: Guardiola31337/openclaw
  OPENCLAW_HOST_API_REF: agentkit/external-plugin-host-apis-main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.0
          run_install: false
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - uses: actions/checkout@v5
        with:
          repository: ${{ env.OPENCLAW_HOST_API_REPOSITORY }}
          ref: ${{ env.OPENCLAW_HOST_API_REF }}
          path: .openclaw-source
      - run: pnpm install --frozen-lockfile --ignore-scripts
        working-directory: .openclaw-source
      - run: pnpm build gatewayWatch
        working-directory: .openclaw-source
      - run: pnpm build:plugin-sdk:strict-smoke
        working-directory: .openclaw-source
      - run: pnpm dev:link-openclaw .openclaw-source
      - run: pnpm test:hitl
      - run: pnpm test:openclaw-hitl
      - run: pnpm pack:check
